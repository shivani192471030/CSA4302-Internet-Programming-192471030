
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TechSavvy Online Shopping</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#1f4e79;color:#fff;padding:15px;text-align:center}
section{background:#fff;margin:15px;padding:15px;border-radius:8px}
input,select,button,textarea{padding:8px;margin:5px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #999;padding:8px;text-align:center}
</style>
</head>
<body>
<header><h1>TechSavvy Online Shopping</h1></header>

<section>
<h2>Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p><b>Admin:</b> admin / admin123</p>
</section>

<section>
<h2>Register</h2>
<input id="name" placeholder="Name">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="register()">Register</button>
</section>

<section>
<h2>Search Products</h2>
<input id="search" placeholder="Search">
<select id="category">
<option>Smartphones</option>
<option>Laptops</option>
<option>Tablets</option>
<option>Accessories</option>
</select>
<button onclick="searchProduct()">Search</button>
<p id="result"></p>
</section>

<section>
<h2>Product Details</h2>
<select id="product">
<option>iPhone</option>
<option>Gaming Laptop</option>
<option>Android Tablet</option>
<option>Wireless Earbuds</option>
</select>
<button onclick="details()">View Details</button>
<p id="desc"></p>
<button onclick="addCart()">Add to Cart</button>
</section>

<section>
<h2>Shopping Cart</h2>
<button onclick="showCart()">Refresh</button>
<table id="cartTable">
<tr><th>Product</th><th>Price</th></tr>
</table>
<button onclick="removeCart()">Remove Last Item</button>
<button onclick="checkout()">Checkout</button>
</section>

<section>
<h2>Order Status</h2>
<input id="orderId" placeholder="Order ID">
<button onclick="status()">Check</button>
<p id="statusText"></p>
</section>

<section>
<h2>Order History</h2>
<table id="history">
<tr><th>Order ID</th><th>Items</th><th>Status</th></tr>
</table>
</section>

<section>
<h2>Wishlist & Reviews</h2>
<button onclick="wishlist()">Add to Wishlist</button><br>
<textarea id="review"></textarea><br>
<button onclick="addReview()">Submit Review</button>
<div id="reviews"></div>
</section>

<section>
<h2>Admin Panel</h2>
<input id="newItem" placeholder="New Product">
<input id="newPrice" placeholder="Price">
<textarea id="newDesc" placeholder="Description"></textarea><br>
<button onclick="addItem()">Add Product</button>
<button onclick="updatePrice()">Update Price</button>
<button onclick="removeItem()">Remove Last Product</button>
<button onclick="customers()">View Customers</button>
<p id="customerList"></p>
</section>

<script>
let currentUser=null;
let users=[];
let reviews=[];
let wishlistItems=[];
let products=[
{name:"iPhone",price:80000,desc:"Apple Smartphone"},
{name:"Gaming Laptop",price:95000,desc:"RTX Gaming Laptop"},
{name:"Android Tablet",price:25000,desc:"10-inch Tablet"},
{name:"Wireless Earbuds",price:3500,desc:"Bluetooth Earbuds"}
];
let cart=[];
let orders=[];

function register(){users.push({name:name.value,user:user.value,pass:pass.value});alert("Registered");}
function login(){
 if(loginUser.value==="admin"&&loginPass.value==="admin123"){currentUser="Admin";alert("Admin Login");return;}
 let u=users.find(x=>x.user===loginUser.value&&x.pass===loginPass.value);
 if(u){currentUser=u.user;alert("Welcome "+u.name);}else alert("Invalid Login");
}
function searchProduct(){
 let p=products.find(x=>x.name.toLowerCase().includes(search.value.toLowerCase()))||products[0];
 result.innerHTML=p.name+" | ₹"+p.price+" | "+category.value;
}
function details(){
 let p=products.find(x=>x.name===product.value);
 desc.innerHTML="<b>"+p.name+"</b><br>"+p.desc+"<br>₹"+p.price;
}
function addCart(){
 let p=products.find(x=>x.name===product.value);
 cart.push(p);alert("Added to Cart");
}
function showCart(){
 let t=document.getElementById("cartTable");
 t.innerHTML="<tr><th>Product</th><th>Price</th></tr>";
 cart.forEach(c=>t.innerHTML+=`<tr><td>${c.name}</td><td>₹${c.price}</td></tr>`);
}
function removeCart(){cart.pop();showCart();}
function checkout(){
 if(!currentUser||currentUser==="Admin"){alert("Login as User");return;}
 if(cart.length==0){alert("Cart Empty");return;}
 let id="ORD"+(orders.length+1);
 orders.push({id:id,user:currentUser,items:cart.length,status:"Confirmed"});
 cart=[];
 showCart();
 let h=document.getElementById("history");
 h.innerHTML="<tr><th>Order ID</th><th>Items</th><th>Status</th></tr>";
 orders.forEach(o=>{if(o.user===currentUser||currentUser==="Admin")h.innerHTML+=`<tr><td>${o.id}</td><td>${o.items}</td><td>${o.status}</td></tr>`;});
 alert("Payment Successful (Demo). Order: "+id);
}
function status(){
 let o=orders.find(x=>x.id===orderId.value);
 statusText.innerHTML=o?"Status: "+o.status:"Order Not Found";
}
function wishlist(){wishlistItems.push(product.value);alert("Added to Wishlist");}
function addReview(){reviews.push(review.value);document.getElementById("reviews").innerHTML=reviews.map(r=>"<p>⭐ "+r+"</p>").join("");review.value="";}
function addItem(){products.push({name:newItem.value,price:newPrice.value,desc:newDesc.value});alert("Product Added");}
function updatePrice(){if(products.length){products[products.length-1].price=newPrice.value;alert("Price Updated");}}
function removeItem(){products.pop();alert("Last Product Removed");}
function customers(){customerList.innerHTML=users.map(u=>u.name).join("<br>");}
</script>
</body>
</html>
